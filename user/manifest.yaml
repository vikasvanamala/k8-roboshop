apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
data:
  MONGO: "true"
  REDIS_URL: 'redis://redis:6379'
  MONGO_URL: "mongodb://mongodb:27017/users"

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    component: user
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      tier: backend

  template:
    metadata: 
      labels:
        project: roboshop
        component: user
        tier: backend
    
    spec:
      containers:
      - name: user
        image: vikasvanamala/user:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: user
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 20
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: user
  namespace: roboshop

spec:
  selector:
    project: roboshop
    component: user
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080




