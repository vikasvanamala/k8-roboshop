appVersion: v1
kind: ConfigMap
meatdata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---
appVersion: apps/v1
kind: Deployment

metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend

  template:
    metadata: 
      labels:
        project: roboshop
        component: catalogue
        tier: backend
    
    spec:
      containers:
      - name: catalogue
        image: vikasvanamala/catalogue:v1
        imagePullPolicy: Always
        envFrom:
        - ConfigMapRef:
            name: catalogue
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 20
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 20

---
appVersion: v1
kind: Service

metadata:
  name: catalogue
  namespace: roboshop

spec:
  selector:
    project: roboshop
    component: catalogue
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080




