apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;

    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

      server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        location /images/ {
            expires 5s;
            root /usr/share/nginx/html;
            try_files $uri /images/placeholder.jpg;
        }

        # Catalogue Service
        location /api/catalogue/ {
            proxy_pass http://catalogue:8080/;
        }

        # User Service
        location /api/user/ {
            proxy_pass http://user:8080/;
        }

        # Cart Service
        location /api/cart/ {
            proxy_pass http://cart:8080/;
        }

        # Shipping Service
        location /api/shipping/ {
            proxy_pass http://shipping:8080/;
        }

        # Payment Service
        location /api/payment/ {
            proxy_pass http://payment:8080/;
        }

        location /health {
            stub_status on;
            access_log off;
        }

      }
    }


---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: backend

  template:
    metadata: 
      labels:
        project: roboshop
        component: frontend
        tier: backend
    
    spec:
      containers:
      - name: frontend
        image: vikasvanamala/frontend:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: frontend
        ports:
        - name: liveness-port
          containerPort: 80
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: liveness-port
        #   failureThreshold: 1
        #   periodSeconds: 20
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: liveness-port
        #   failureThreshold: 1
        #   periodSeconds: 20
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: frontend  
---
apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: roboshop

spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    tier: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80




