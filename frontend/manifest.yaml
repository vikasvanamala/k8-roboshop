apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
      worker_connections 1024;
    }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {
          listen 80;
          server_name _;

          root /usr/share/nginx/html;
          index index.html;

          # ⭐ SPA FIX (refresh problem solved)
          location / {
            try_files $uri $uri.html $uri/ =404;
          }

    # API routes
          location /api/catalogue/ { proxy_pass http://catalogue:8080; }
          location /api/user/      { proxy_pass http://user:8080; }
          location /api/cart/      { proxy_pass http://cart:8080; }
          location /api/shipping/  { proxy_pass http://shipping:8080; }
          location /api/payment/   { proxy_pass http://payment:8080; }

          # Health check
          location /health {
              return 200 "OK";
          }
        }   
    }


---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: backend

  template:
    metadata: 
      labels:
        project: roboshop
        component: frontend
        tier: backend
    
    spec:
      containers:
      - name: frontend
        image: vikasvanamala/frontend:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: frontend
        ports:
        - name: liveness-port
          containerPort: 80
        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: liveness-port
        #   failureThreshold: 1
        #   periodSeconds: 20
        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: liveness-port
        #   failureThreshold: 1
        #   periodSeconds: 20
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: frontend  
---
apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: roboshop

spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    tier: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80




